name: benchmark

on:
  push:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j

      - name: Correctness tests (heavy-hitter recall)
        run: ctest --test-dir build --output-on-failure

      - name: Download MovieLens 32M (real dataset)
        run: |
          curl -sL -o ml.zip https://files.grouplens.org/datasets/movielens/ml-32m.zip
          unzip -q ml.zip
          echo "rows:"; wc -l ml-32m/ratings.csv

      - name: Top-K trending movies over 32M ratings (column 1 = movieId)
        run: ./build/benchmark ml-32m/ratings.csv 1

      - name: Top-K on synthetic skewed stream (for comparison)
        run: ./build/benchmark
