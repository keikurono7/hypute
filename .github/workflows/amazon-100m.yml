name: amazon-100m

# Heavy real-data run: streams up to 100M Amazon Reviews '23 records and finds
# the top-K trending products from a tiny cache-resident sketch, then reports
# recall vs an exact count-everything-and-sort baseline. Manual trigger only.

on:
  workflow_dispatch:
    inputs:
      records:
        description: "number of records"
        default: "100000000"

jobs:
  amazon:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Build (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j

      - name: Generate Amazon Reviews '23 dataset
        run: |
          python3 bench/gen_amazon.py amazon.csv ${{ github.event.inputs.records }}
          echo "rows:"; wc -l amazon.csv

      - name: Top-K trending products over 100M reviews (column 1 = item_id)
        run: /usr/bin/time -v ./build/benchmark amazon.csv 1
